<div class="admintProducts container py-5">
  <button class="btn btn-primary" routerLink="/admin/products/new">
    New product
  </button>

  <!-- table -->
  <table class="table text-center">
    <thead>
      <th>Title</th>
      <th>Price</th>
      <th>Category</th>
      <th></th>
      <th></th>
    </thead>
    <tbody>
      <tr *ngFor="let product of products">
        <td>{{ product.name }}</td>
        <td>{{ product.price | currency: "USD" : "symbol" }}</td>
        <td>{{ product.category }}</td>
        <td>
          <a
            [routerLink]="['/admin/products/', product.key]"
            class="btn btn-primary"
            >Edit</a
          >
        </td>
        <td>
          <button
            (click)="delete(product.key)"
            type="button"
            class="btn btn-danger"
          >
            Delete
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
