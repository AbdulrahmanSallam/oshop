<div class="not-found">
  <div class="not-found__container">
    <div class="not-found__content">
      <!-- 404 Illustration -->
      <div class="not-found__illustration">
        <div class="not-found__number">
          <span class="not-found__digit not-found__digit--left">4</span>
          <div class="not-found__icon-wrapper">
            <i class="fas fa-shopping-cart not-found__icon"></i>
          </div>
          <span class="not-found__digit not-found__digit--right">4</span>
        </div>
      </div>

      <!-- Message -->
      <h1 class="not-found__title">Page Not Found</h1>
      <p class="not-found__description">
        Oops! The page you're looking for doesn't exist or has been moved.
      </p>
      <p class="not-found__subtitle">Let's get you back on track!</p>

      <!-- Actions -->
      <div class="not-found__actions">
        <a routerLink="/" class="not-found__btn not-found__btn--primary">
          <i class="fas fa-home"></i>
          Back to Home
        </a>
        <a
          routerLink="/products"
          class="not-found__btn not-found__btn--secondary"
        >
          <i class="fas fa-th-large"></i>
          Browse Products
        </a>
      </div>

      <!-- Helpful Links -->
      <div class="not-found__links">
        <span class="not-found__links-label">You might be looking for:</span>
        <div class="not-found__links-list">
          <a routerLink="/shopping-cart" class="not-found__link">
            <i class="fas fa-shopping-cart"></i> Cart
          </a>
          <a routerLink="/my-orders" class="not-found__link">
            <i class="fas fa-shopping-bag"></i> My Orders
          </a>
          <a routerLink="/login" class="not-found__link">
            <i class="fas fa-sign-in-alt"></i> Login
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
