<nav class="navbar navbar-expand-lg navbar-light bg-light">
  <a class="navbar-brand" routerLink="/">O</a>
  <button
    class="navbar-toggler"
    type="button"
    data-toggle="collapse"
    data-target="#navbarSupportedContent"
    aria-controls="navbarSupportedContent"
    aria-expanded="false"
    aria-label="Toggle navigation"
  >
    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="collapse navbar-collapse" id="navbarSupportedContent">
    <ul class="navbar-nav mr-auto">
      <li class="nav-item">
        <a class="nav-link" routerLink="/shopping-cart">Shopping cart</a>
      </li>

      <li
        *ngIf="authService.user$ | async as user; else anonymousUser"
        ngbDropdown
        class="nav-item dropdown"
      >
        <a
          ngbDropdownToggle
          class="nav-link dropdown-toggle"
          id="navbarDropdown"
          role="button"
          data-toggle="dropdown"
          aria-haspopup="true"
          aria-expanded="false"
        >
          {{ user.displayName }}
        </a>
        <div
          ngbDropdownMenu
          class="dropdown-menu"
          aria-labelledby="navbarDropdown"
        >
          <a ngbDropdownItem class="dropdown-item" routerLink="/my-orders"
            >My orders</a
          >
          <a ngbDropdownItem class="dropdown-item" routerLink="/admin/orders"
            >Manage orders</a
          >
          <a ngbDropdownItem class="dropdown-item" routerLink="/admin/products"
            >Manage products</a
          >
          <div class="dropdown-divider"></div>
          <a ngbDropdownItem class="dropdown-item" (click)="logout()"
            >Log out</a
          >
        </div>
      </li>

      <ng-template #anonymousUser>
        <li class="nav-item">
          <a class="nav-link" routerLink="/login">Login</a>
        </li>
      </ng-template>
    </ul>
  </div>
</nav>
