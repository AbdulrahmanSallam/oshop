<div class="container pt-4">
  <div class="row">
    <div class="col-4 col-md-3 col-lg-2">
      <product-filter [category]="category"></product-filter>
    </div>

    <div class="col row">
      <div *ngFor="let product of filteredProducts" class="col-4">
        <product-card
          [product]="product"
          [cart]="cart"
          [show-actions]="true"
        ></product-card>
      </div>
    </div>
  </div>
</div>
