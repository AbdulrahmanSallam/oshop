<div class="container pt-4">
  <div class="row">
    <div class="col-2">
      <div class="list-group">
        <a
          routerLink="/"
          [class.active]="!category"
          class="list-group-item list-group-item-action"
        >
          All categories</a
        >
        <a
          *ngFor="let c of categories$ | async"
          routerLink="/"
          [queryParams]="{ category: c.name }"
          class="list-group-item list-group-item-action"
          [class.active]="c.name === category"
          >{{ c.name }}</a
        >
      </div>
    </div>

    <div class="col row">
      <div *ngFor="let product of filteredProducts" class="col-4">
        <div class="card">
          <img
            class="card-img-top"
            [src]="product.imageUrl"
            [alt]="product.name"
          />
          <div class="card-body">
            <h3 class="card-title">
              {{ product.name }}
            </h3>
            <p class="card-text">
              {{ product.price | currency: "USD" : "symbol" }}
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
