<div class="row">
  <div *ngFor="let product of products$ | async" class="col">
    <div class="card">
      <img class="card-img-top" [src]="product.imageUrl" [alt]="product.name" />
      <div class="card-body">
        <h2 class="card-title">
          {{ product.name }}
        </h2>
        <p class="card-text">
          {{ product.price | currency: "USD" : "symbol" }}
        </p>
      </div>
    </div>
  </div>
</div>
