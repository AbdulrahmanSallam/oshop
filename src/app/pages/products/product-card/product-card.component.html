<div class="card">
  <img class="card-img-top" [src]="product.imageUrl" [alt]="product.name" />
  <div class="card-body">
    <h3 class="card-title">
      {{ product.name }}
    </h3>
    <p class="card-text">
      {{ product.price | currency: "USD" : "symbol" }}
    </p>
  </div>

  <div *ngIf="showActions" class="card-footer">
    <button
      *ngIf="!shoppingCartItem; else quantity"
      (click)="addToCart()"
      class="btn btn-primary w-100 rounded-0"
    >
      Add to cart
    </button>

    <ng-template #quantity>
      <product-quantity
        [shopping-cart-item]="shoppingCartItem!"
      ></product-quantity>
    </ng-template>
  </div>
</div>
