<div class="card">
  <img class="card-img-top" [src]="product.imageUrl" [alt]="product.name" />
  <div class="card-body">
    <h3 class="card-title">
      {{ product.name }}
    </h3>
    <p class="card-text">
      {{ product.price | currency: "USD" : "symbol" }}
    </p>
  </div>
  <div class="card-footer">
    <button *ngIf="showActions" class="btn btn-primary w-100 rounded-0">
      Add to cart
    </button>
  </div>
</div>
